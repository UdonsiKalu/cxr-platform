namespace: cxr-ui

# CD-001: bumped by GHA on push; Argo syncs this chart from Git.
gitOpsDeployMarker: "gha-fcb767e076318af1"

image:
  repository: cxr-analyzer
  tag: perf003
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8766

# Reach host SQL / Qdrant from kind pods (see kind/cxr-lab.yaml extraHosts)
hostGateway: host.docker.internal

env:
  CXR_ANALYZER_HOST: "0.0.0.0"
  CXR_ANALYZER_PORT: "8766"
  CXR_TRACE_PROFILE: detailed
  OTEL_SERVICE_NAME: cxr-analyzer-service
  CXR_QDRANT_URL: "http://host.docker.internal:6333"
  CXR_SQL_SERVER: "host.docker.internal,1433"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
  # PERF-008: set >0 to enable semaphore + cxr_analyzer_queue_depth (optional lab)
  CXR_ANALYZER_MAX_CONCURRENT: "0"

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 6Gi

probes:
  readiness:
    path: /health/ready
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    path: /health
    initialDelaySeconds: 120
    periodSeconds: 30
  startup:
    path: /health/ready
    periodSeconds: 10
    failureThreshold: 60

autoscaling:
  enabled: true
  minReplicas: 2
  # Docker Desktop single-node: 20 × 2Gi request exhausts memory → Pending + HPA thrash (LOAD-003 2026-06-18).
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  keda:
    # SCALE-001: KEDA replaces CPU-only HPA when enabled (requires scripts/11-keda-install.sh).
    enabled: true
    pollingInterval: 15
    cooldownPeriod: 120
    prometheus:
      enabled: true
      serverAddress: http://host.docker.internal:9090
      # Experiment A (default): E2E Locust p95 + CPU. Experiment B: backpressure + CPU.
      mode: p95  # p95 | backpressure
      query: cxr_locust_p95_ms
      p95ThresholdMs: 2000
      backpressureQuery: sum(cxr_analyzer_inflight_requests) / clamp_min(cxr_analyzer_replicas, 1)
      backpressureThreshold: "2"
  vpa:
    # SCALE-003 / PROF: recommendation-only until requests are tuned (requires scripts/12-vpa-install.sh).
    enabled: true
    updateMode: "Off"
