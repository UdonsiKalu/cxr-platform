{{- if .Values.autoscaling.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cxr-analyzer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: cxr-analyzer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cxr-analyzer
  updatePolicy:
    updateMode: {{ .Values.autoscaling.vpa.updateMode | quote }}
{{- end }}
