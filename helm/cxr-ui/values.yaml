namespace: cxr-ui

gitOpsDeployMarker: "gha-d4591b226b8b435d"

image:
  repository: cxr-ui
  tag: local
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 3000

env:
  NODE_ENV: production

# In-cluster analyzer (cxr-analyzer Helm release). Empty = subprocess fallback (broken in K8 UI image).
analyzerUrl: "http://cxr-analyzer:8766"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  readiness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 20

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80
