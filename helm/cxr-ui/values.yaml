namespace: cxr-ui

gitOpsDeployMarker: "gha-fcb767e076318af1"

image:
  repository: cxr-ui
  tag: local
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 3000

env:
  NODE_ENV: production

# SW.11 — OTLP to host observe stack (Jaeger via collector :4318)
otel:
  enabled: true
  exporterEndpoint: "http://host.docker.internal:4318"
  serviceName: cxr-ui-k8

# In-cluster analyzer (cxr-analyzer Helm release). Empty = subprocess fallback (broken in K8 UI image).
analyzerUrl: "http://cxr-analyzer:8766"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  readiness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 20

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
