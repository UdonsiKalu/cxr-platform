# SW.15 — GraphQL federation lab (gateway + 2 mock subgraphs)
# Gateway  http://localhost:4000/graphql  (Apollo Sandbox UI when opened in browser)
# Claims   http://localhost:4001/graphql
# Policies http://localhost:4002/graphql

services:
  graphql-claims:
    build:
      context: .
      dockerfile: lab/graphql/Dockerfile
    restart: unless-stopped
    command: ["node", "claims-subgraph.mjs"]
    environment:
      PORT: "4001"
    ports:
      - "4001:4001"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-H",
          "Content-Type: application/json",
          "-d",
          '{"query":"{ __typename }"}',
          "http://localhost:4001/graphql",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  graphql-policies:
    build:
      context: .
      dockerfile: lab/graphql/Dockerfile
    restart: unless-stopped
    command: ["node", "policies-subgraph.mjs"]
    environment:
      PORT: "4002"
    ports:
      - "4002:4002"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "-H",
          "Content-Type: application/json",
          "-d",
          '{"query":"{ __typename }"}',
          "http://localhost:4002/graphql",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  graphql-gateway:
    build:
      context: .
      dockerfile: lab/graphql/Dockerfile
    restart: unless-stopped
    command: ["node", "gateway.mjs"]
    environment:
      PORT: "4000"
      CLAIMS_SUBGRAPH_URL: http://graphql-claims:4001/graphql
      POLICIES_SUBGRAPH_URL: http://graphql-policies:4002/graphql
    ports:
      - "4000:4000"
    depends_on:
      graphql-claims:
        condition: service_healthy
      graphql-policies:
        condition: service_healthy
