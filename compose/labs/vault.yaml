# SW.17 — HashiCorp Vault dev mode (bootcamp secrets lab; not production)
# Vault API + UI  http://localhost:8200
# Root token:    cxr-bootcamp-root  (dev only — never use in prod)

services:
  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: cxr-bootcamp-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
