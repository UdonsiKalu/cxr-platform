# SW.16 — gRPC lab (ClaimAnalysis service + grpcui browser)
# gRPC server  localhost:50051  (ClaimAnalysis — GetClaimStatus, AnalyzeClaim)
# grpcui       http://localhost:8090  (browser invoke / inspect proto)

services:
  grpc-analysis:
    build:
      context: .
      dockerfile: lab/grpc/Dockerfile
    restart: unless-stopped
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "node", "client-smoke.mjs"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 8s

  grpc-ui:
    image: fullstorydev/grpcui:v1.4.3
    restart: unless-stopped
    command:
      [
        "-plaintext",
        "-bind",
        "0.0.0.0",
        "-port",
        "8090",
        "grpc-analysis:50051",
      ]
    ports:
      - "8090:8090"
    depends_on:
      grpc-analysis:
        condition: service_healthy
