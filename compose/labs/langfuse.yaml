# SW.18 — Langfuse v2 + Postgres (lightweight bootcamp; not full v3 stack)
# Langfuse UI  http://localhost:3100  (3100 avoids CXR Claim Studio :3000)
# First visit: sign up → Project → API Keys → lab/langfuse/keys.env

services:
  langfuse-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 12

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: cxr-bootcamp-langfuse-nextauth-secret-32c
      SALT: cxr-bootcamp-salt
      NEXTAUTH_URL: http://localhost:3100
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

volumes:
  langfuse_pg_data:
