global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/cxr_recording_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cxr-ui-host
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: cxr-ui-compose

  # kube-state-metrics — start scripts/k8-ksm-port-forward.sh (host :9091)
  - job_name: kube-state-metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          cluster: docker-desktop

  # Locust + kubectl load metrics — scripts/k8-load-exporter.sh (host :9102)
  - job_name: cxr-load-exporter
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9102"]
        labels:
          cluster: docker-desktop

  # Synthetic operational-readiness traffic — scripts/25-synthetic-readiness-up.sh (host :9103)
  - job_name: cxr-synthetic-readiness
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9103"]
        labels:
          profile: operational_readiness
          environment: local

  # Analyzer backpressure — per-pod port-forwards (8767+) via k8-analyzer-metrics-forward.sh
  - job_name: cxr-analyzer
    scrape_interval: 5s
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/analyzer_targets.json
        refresh_interval: 10s
