global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cxr-ui-host
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: cxr-ui-compose

  # kube-state-metrics — start scripts/k8-ksm-port-forward.sh (host :9091)
  - job_name: kube-state-metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          cluster: docker-desktop
