# SW.8 — Argo CD Application (requires Git repo with this chart).
# Set CXR_ARGO_REPO_URL before apply, e.g.:
#   export CXR_ARGO_REPO_URL=https://github.com/UdonsiKalu/cxr-ops-lab.git
#   export CXR_ARGO_REPO_REVISION=main
#   envsubst < k8s/argocd/application-cxr-ui.yaml | kubectl apply -f -
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cxr-ui
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${CXR_ARGO_REPO_URL}
    targetRevision: ${CXR_ARGO_REPO_REVISION}
    path: helm/cxr-ui
    helm:
      valueFiles:
        - values.yaml
      # parameters:
      #   - name: autoscaling.maxReplicas
      #     value: "5"
  destination:
    server: https://kubernetes.default.svc
    namespace: cxr-ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
