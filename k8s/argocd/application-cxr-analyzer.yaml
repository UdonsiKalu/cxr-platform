# SW.8 — Argo CD Application for analyzer + HPA chart.
# Apply via scripts/13-argo-install.sh (envsubst).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cxr-analyzer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${CXR_ARGO_REPO_URL}
    targetRevision: ${CXR_ARGO_REPO_REVISION}
    path: helm/cxr-analyzer
    helm:
      valueFiles:
        - values.yaml
      # GIT-001: source of truth is helm/cxr-analyzer/values.yaml on Git main.
      # Prefer push + Argo sync over `kubectl patch application` Helm parameters
      # (those were a temporary LOAD-003 / GATE-002 lab workaround and cause drift).
      # Baseline: maxReplicas 8, minReplicas 2, KEDA p95ThresholdMs 2000.
  destination:
    server: https://kubernetes.default.svc
    namespace: cxr-ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
