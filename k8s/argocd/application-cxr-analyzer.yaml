# SW.8 — Argo CD Application for analyzer + HPA chart.
# Apply via scripts/13-argo-install.sh (envsubst).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cxr-analyzer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${CXR_ARGO_REPO_URL}
    targetRevision: ${CXR_ARGO_REPO_REVISION}
    path: helm/cxr-analyzer
    helm:
      valueFiles:
        - values.yaml
      # LOAD-003 stability (2026-06-18): override via `kubectl patch application` or push values.yaml to Git.
      # parameters:
      #   - name: image.tag
      #     value: perf003
      #     forceString: true
      #   - name: autoscaling.maxReplicas
      #     value: "8"
      #   - name: autoscaling.minReplicas
      #     value: "2"
      #   - name: autoscaling.keda.enabled
      #     value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: cxr-ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
