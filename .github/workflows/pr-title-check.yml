# Enforce Conventional Commits-style PR titles (see docs/standards/GITHUB-NAMING-STANDARDS.md).
name: pr-title-check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|study)(\([a-z0-9_-]+\))?!?: .+(\[(OBS|PERF|GATE|LOAD|OPS|GIT|DOC|SCALE|CHAOS|DEP)-[0-9]+\])?$'
          if ! printf '%s' "$PR_TITLE" | grep -Eq "$pattern"; then
            echo "::error::PR title does not match naming standard."
            echo ""
            echo "Expected: type(scope): outcome in plain English [ID]"
            echo "Example:  fix(analyzer): prevent shared SQL connection errors under concurrent load [OBS-003]"
            echo ""
            echo "Docs: docs/standards/GITHUB-NAMING-STANDARDS.md"
            echo "Got:  $PR_TITLE"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"
