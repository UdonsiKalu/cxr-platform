# SW.2 — rehearsal cxr-ui + optional Qdrant sidecar + full CXR lab env
# Run: ./scripts/04-compose-up.sh  (Linux adds compose.host.yaml)
# Secrets: copy .env.compose.example → .env.compose.local

services:
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["with-lab-qdrant"]
    restart: unless-stopped
    ports:
      - "6335:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  cxr-ui:
    image: cxr-ui:compose
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.compose.local
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # --- Python spawn (claim-studio, analyze-claim) ---
      CXR_ANALYZER_SCRIPT: /analyzers/analyze_sample.py
      CXR_JUDGE_SCRIPT: /analyzers/judge_claim.py
      CXR_EXAMPLES_FOLDER: /analyzers/examples
      PYTHONUNBUFFERED: "1"
      # --- Qdrant (overridden on host overlay to :6333) ---
      QDRANT_URL: http://qdrant:6333
      # --- SQL defaults (override in .env.compose.local) ---
      CXR_SQL_SERVER: ${CXR_SQL_SERVER:-127.0.0.1,1433}
      CXR_SQL_UID: ${CXR_SQL_UID:-SA}
      CXR_TERMINAL_DB: ${CXR_TERMINAL_DB:-_claims}
      CXR_ARCHETYPE_DB: ${CXR_ARCHETYPE_DB:-_archetype}
      CXR_DATA_SOURCE: ${CXR_DATA_SOURCE:-db}
      CXR_BATCH_ID: ${CXR_BATCH_ID:-2024Q1_20k_run}
      # --- Judge / Ollama ---
      CXR_JUDGE_BACKEND: ${CXR_JUDGE_BACKEND:-ollama}
      CXR_JUDGE_MODEL: ${CXR_JUDGE_MODEL:-llama3:8b-instruct-q4_0}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://127.0.0.1:11434}
      # --- Writable app data ---
      CLAIM_STUDIO_AUDIT_STORE_DIR: /app/data/claim-studio-audit
      CLAIMS_COMMONS_STORE_DIR: /app/data/claims_commons_store
    volumes:
      - ${CXR_ANALYZERS_HOST:-../cxrlabs-dev/claim_analysis_tools}:/analyzers:ro
      - cxr_ui_data:/app/data

volumes:
  qdrant_storage:
  cxr_ui_data:
